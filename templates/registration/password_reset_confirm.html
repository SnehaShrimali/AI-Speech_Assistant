{% extends 'base.html' %}
{% load static %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="fas fa-lock text-primary fa-2x"></i>
                <h4 class="fw-bold mt-2">Set New Password</h4>
            </div>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-medium">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Reset Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
