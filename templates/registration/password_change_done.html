{% extends 'base.html' %}
{% load static %}

{% block title %}Password Changed{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-lg border-0 text-center" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            <i class="fas fa-check-circle text-success fa-4x mb-3"></i>
            <h4 class="fw-bold">Password Changed!</h4>
            <p class="text-muted">Your password has been changed successfully.</p>
            <a href="{% url 'accounts:profile' %}" class="btn btn-primary px-4">Back to Profile</a>
        </div>
    </div>
</div>
{% endblock %}
