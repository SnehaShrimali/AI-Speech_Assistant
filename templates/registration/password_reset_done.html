{% extends 'base.html' %}
{% load static %}

{% block title %}Email Sent{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="card shadow-lg border-0 text-center" style="width: 100%; max-width: 450px;">
        <div class="card-body p-5">
            <i class="fas fa-check-circle text-success fa-4x mb-3"></i>
            <h4 class="fw-bold">Email Sent!</h4>
            <p class="text-muted">If an account exists with that email, you'll receive password reset instructions.</p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary px-4">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
